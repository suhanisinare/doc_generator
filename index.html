<!DOCTYPE html>
<html>
<head>
    <title>Doc Generator</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-dark text-white">

<div class="container text-center mt-5">
    <h1 class="mb-4">📄 Automated Documentation Generator</h1>

    <form method="POST" enctype="multipart/form-data" class="p-4 border rounded bg-secondary">
        <input class="form-control mb-3" type="file" name="file" required>
        <button class="btn btn-warning">Generate Documentation</button>
    </form>
</div>

</body>
</html>
